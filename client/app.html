<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeatBond - App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="app-page">
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1 class="logo">BeatBond</h1>
          <p class="topbar-subtitle">Your social music platform</p>
        </div>

        <div class="topbar-right">
          <p id="status" class="status-text">Checking login...</p>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </header>

      <div id="appMessage" class="app-message hidden"></div>

      <main class="dashboard-grid">
        <section class="card compact-card">
          <div class="section-header">
            <h2>Create Playlist</h2>
          </div>

          <input type="text" id="playlistTitle" placeholder="Playlist title" />
          <input
            type="text"
            id="playlistDescription"
            placeholder="Playlist description"
          />

          <label class="checkbox-row">
            <input type="checkbox" id="playlistIsPublic" checked />
            <span>Public playlist</span>
          </label>

          <button onclick="createPlaylist()">Create Playlist</button>
        </section>

        <section class="card compact-card">
          <div class="section-header">
            <h2>My Social Data</h2>
            <button onclick="loadSocialData()">Refresh</button>
          </div>

          <div class="two-columns">
            <div>
              <h3>Following</h3>
              <ul id="followingList" class="data-list"></ul>
            </div>

            <div>
              <h3>Followers</h3>
              <ul id="followersList" class="data-list"></ul>
            </div>
          </div>
        </section>

        <section class="card scroll-card">
          <div class="section-header">
            <h2>My Playlists</h2>
            <button onclick="getMyPlaylists()">Refresh</button>
          </div>

          <ul id="playlistList" class="playlist-list"></ul>
        </section>

        <section class="card scroll-card">
          <div class="section-header">
            <h2>Discover Public Playlists</h2>
            <button onclick="loadDiscover()">Refresh</button>
          </div>

          <ul id="discoverList" class="playlist-list"></ul>
        </section>
      </main>
    </div>

    <script>
      const API_BASE_URL = "https://beatbond-81f5.onrender.com";

      let currentUserId = null;
      let currentUsername = "";
      let followingUserIds = new Set();
      let openSongFormPlaylistId = null;

      const token = localStorage.getItem("token");

      if (!token) {
        window.location.href = "index.html";
      }

      const appMessage = document.getElementById("appMessage");

      const showAppMessage = (message, type = "success") => {
        appMessage.textContent = message;
        appMessage.className = `app-message ${type}`;
      };

      const clearAppMessage = () => {
        appMessage.textContent = "";
        appMessage.className = "app-message hidden";
      };

      const updateStatus = () => {
        const token = localStorage.getItem("token");

        if (token) {
          document.getElementById("status").innerText = "Logged in";
        } else {
          document.getElementById("status").innerText = "Not logged in";
        }
      };

      updateStatus();

      const logout = () => {
        localStorage.removeItem("token");
        currentUserId = null;
        currentUsername = "";
        followingUserIds = new Set();
        window.location.href = "index.html";
      };

      const createPlaylist = async () => {
        clearAppMessage();

        const token = localStorage.getItem("token");

        if (!token) {
          showAppMessage("Please login first", "error");
          return;
        }

        const title = document.getElementById("playlistTitle").value.trim();
        const description = document
          .getElementById("playlistDescription")
          .value.trim();
        const isPublic = document.getElementById("playlistIsPublic").checked;

        if (!title) {
          showAppMessage("Please enter a playlist title", "error");
          return;
        }

        try {
          const res = await fetch(`${API_BASE_URL}/api/playlists`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: token,
            },
            body: JSON.stringify({
              title,
              description,
              isPublic,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            showAppMessage(
              data.message || "Could not create playlist",
              "error",
            );
            return;
          }

          document.getElementById("playlistTitle").value = "";
          document.getElementById("playlistDescription").value = "";
          document.getElementById("playlistIsPublic").checked = true;

          showAppMessage("Playlist created successfully", "success");
          getMyPlaylists();
          loadDiscover();
        } catch (error) {
          showAppMessage("Server error. Please try again later.", "error");
        }
      };

      const toggleSongForm = (playlistId) => {
        if (openSongFormPlaylistId === playlistId) {
          openSongFormPlaylistId = null;
        } else {
          openSongFormPlaylistId = playlistId;
        }

        getMyPlaylists();
      };

      const getMyPlaylists = async () => {
        clearAppMessage();

        const token = localStorage.getItem("token");

        try {
          const res = await fetch(`${API_BASE_URL}/api/playlists/my`, {
            method: "GET",
            headers: {
              Authorization: token,
            },
          });

          const data = await res.json();

          const list = document.getElementById("playlistList");
          list.innerHTML = "";

          if (!data.playlists || data.playlists.length === 0) {
            const li = document.createElement("li");
            li.className = "playlist-card-item";
            li.innerHTML = '<div class="empty-text">No playlists yet</div>';
            list.appendChild(li);
            return;
          }

          data.playlists.forEach((playlist) => {
            const li = document.createElement("li");
            li.className = "playlist-card-item";

            const title = document.createElement("strong");
            title.className = "playlist-title";
            title.innerText = `${playlist.title} ${
              playlist.isPublic ? "(Public)" : "(Private)"
            }`;
            li.appendChild(title);

            if (playlist.description) {
              const desc = document.createElement("div");
              desc.className = "playlist-description";
              desc.innerText = playlist.description;
              li.appendChild(desc);
            }

            const actions = document.createElement("div");
            actions.className = "action-row";

            const addSongBtn = document.createElement("button");
            addSongBtn.innerText =
              openSongFormPlaylistId === playlist._id ? "Cancel" : "Add Song";

            addSongBtn.onclick = () => {
              toggleSongForm(playlist._id);
            };

            actions.appendChild(addSongBtn);

            const deletePlaylistBtn = document.createElement("button");
            deletePlaylistBtn.innerText = "Delete Playlist";

            deletePlaylistBtn.onclick = () => {
              deletePlaylist(playlist._id);
            };

            actions.appendChild(deletePlaylistBtn);
            li.appendChild(actions);

            if (openSongFormPlaylistId === playlist._id) {
              const addSongPanel = document.createElement("div");
              addSongPanel.className = "inline-song-form";

              const songInput = document.createElement("input");
              songInput.type = "text";
              songInput.placeholder = "Enter song name";
              songInput.id = `song-input-${playlist._id}`;

              const saveSongBtn = document.createElement("button");
              saveSongBtn.innerText = "Save Song";
              saveSongBtn.onclick = () => {
                const songValue = document
                  .getElementById(`song-input-${playlist._id}`)
                  .value.trim();
                addSongToPlaylist(playlist._id, songValue);
              };

              addSongPanel.appendChild(songInput);
              addSongPanel.appendChild(saveSongBtn);
              li.appendChild(addSongPanel);
            }

            const songsTitle = document.createElement("div");
            songsTitle.className = "songs-title";
            songsTitle.innerText = "Songs";
            li.appendChild(songsTitle);

            if (playlist.songs.length === 0) {
              const noSongs = document.createElement("div");
              noSongs.className = "empty-text";
              noSongs.innerText = "No songs yet";
              li.appendChild(noSongs);
            } else {
              playlist.songs.forEach((song) => {
                const songItem = document.createElement("div");
                songItem.className = "song-row";

                const songName = document.createElement("span");
                songName.innerText = song;
                songItem.appendChild(songName);

                const deleteSongBtn = document.createElement("button");
                deleteSongBtn.innerText = "Delete";

                deleteSongBtn.onclick = () => {
                  removeSongFromPlaylist(playlist._id, song);
                };

                songItem.appendChild(deleteSongBtn);
                li.appendChild(songItem);
              });
            }

            list.appendChild(li);
          });
        } catch (error) {
          showAppMessage("Could not load playlists", "error");
        }
      };

      const addSongToPlaylist = async (playlistId, song) => {
        clearAppMessage();

        const token = localStorage.getItem("token");

        if (!song) {
          showAppMessage("Please enter a song name", "error");
          return;
        }

        try {
          const res = await fetch(
            `${API_BASE_URL}/api/playlists/${playlistId}/songs`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: token,
              },
              body: JSON.stringify({ song }),
            },
          );

          const data = await res.json();

          if (!res.ok) {
            showAppMessage(data.message || "Could not add song", "error");
            return;
          }

          openSongFormPlaylistId = null;
          showAppMessage("Song added successfully", "success");
          getMyPlaylists();
          loadDiscover();
        } catch (error) {
          showAppMessage("Could not add song", "error");
        }
      };

      const removeSongFromPlaylist = async (playlistId, song) => {
        clearAppMessage();

        const token = localStorage.getItem("token");

        try {
          const res = await fetch(
            `${API_BASE_URL}/api/playlists/${playlistId}/songs`,
            {
              method: "DELETE",
              headers: {
                "Content-Type": "application/json",
                Authorization: token,
              },
              body: JSON.stringify({ song }),
            },
          );

          const data = await res.json();

          if (!res.ok) {
            showAppMessage(data.message || "Could not delete song", "error");
            return;
          }

          showAppMessage("Song removed successfully", "success");
          getMyPlaylists();
          loadDiscover();
        } catch (error) {
          showAppMessage("Could not delete song", "error");
        }
      };

      const deletePlaylist = async (playlistId) => {
        clearAppMessage();

        const token = localStorage.getItem("token");

        try {
          const res = await fetch(
            `${API_BASE_URL}/api/playlists/${playlistId}`,
            {
              method: "DELETE",
              headers: {
                Authorization: token,
              },
            },
          );

          const data = await res.json();

          if (!res.ok) {
            showAppMessage(
              data.message || "Could not delete playlist",
              "error",
            );
            return;
          }

          showAppMessage("Playlist deleted successfully", "success");
          getMyPlaylists();
          loadDiscover();
        } catch (error) {
          showAppMessage("Could not delete playlist", "error");
        }
      };

      const loadSocialData = async () => {
        const token = localStorage.getItem("token");

        try {
          const res = await fetch(`${API_BASE_URL}/api/auth/me/social`, {
            method: "GET",
            headers: {
              Authorization: token,
            },
          });

          const data = await res.json();

          currentUserId = data.userId;
          currentUsername = data.username;
          followingUserIds = new Set(data.following.map((user) => user._id));

          document.getElementById("status").innerText = data.username;

          const followingList = document.getElementById("followingList");
          const followersList = document.getElementById("followersList");

          followingList.innerHTML = "";
          followersList.innerHTML = "";

          if (data.following.length === 0) {
            const li = document.createElement("li");
            li.innerText = "You are not following anyone yet";
            followingList.appendChild(li);
          } else {
            data.following.forEach((user) => {
              const li = document.createElement("li");
              li.innerText = `${user.username} (${user.email})`;
              followingList.appendChild(li);
            });
          }

          if (data.followers.length === 0) {
            const li = document.createElement("li");
            li.innerText = "No followers yet";
            followersList.appendChild(li);
          } else {
            data.followers.forEach((user) => {
              const li = document.createElement("li");
              li.innerText = `${user.username} (${user.email})`;
              followersList.appendChild(li);
            });
          }
        } catch (error) {
          showAppMessage("Could not load social data", "error");
        }
      };

      const followUser = async (userId, username) => {
        clearAppMessage();

        const token = localStorage.getItem("token");

        try {
          const res = await fetch(`${API_BASE_URL}/api/auth/follow/${userId}`, {
            method: "POST",
            headers: {
              Authorization: token,
            },
          });

          const data = await res.json();

          if (!res.ok) {
            showAppMessage(
              data.message || `Could not follow ${username}`,
              "error",
            );
            return;
          }

          followingUserIds.add(userId);
          showAppMessage(`You are now following ${username}`, "success");

          await loadSocialData();
          await loadDiscover();
        } catch (error) {
          showAppMessage("Could not follow user", "error");
        }
      };

      const loadDiscover = async () => {
        try {
          if (!currentUserId) {
            await loadSocialData();
          }

          const res = await fetch(`${API_BASE_URL}/api/playlists/discover`);
          const data = await res.json();

          const list = document.getElementById("discoverList");
          list.innerHTML = "";

          if (!data.playlists || data.playlists.length === 0) {
            const li = document.createElement("li");
            li.className = "playlist-card-item";
            li.innerHTML =
              '<div class="empty-text">No public playlists found</div>';
            list.appendChild(li);
            return;
          }

          data.playlists.forEach((playlist) => {
            const li = document.createElement("li");
            li.className = "playlist-card-item";

            const title = document.createElement("strong");
            title.className = "playlist-title";
            title.innerText = playlist.title;
            li.appendChild(title);

            const owner = document.createElement("div");
            owner.className = "playlist-owner";

            if (playlist.user._id === currentUserId) {
              owner.innerText = `By: ${playlist.user.username} (You)`;
            } else {
              owner.innerText = `By: ${playlist.user.username}`;
            }

            li.appendChild(owner);

            if (playlist.description) {
              const desc = document.createElement("div");
              desc.className = "playlist-description";
              desc.innerText = playlist.description;
              li.appendChild(desc);
            }

            const songsTitle = document.createElement("div");
            songsTitle.className = "songs-title";
            songsTitle.innerText = "Songs";
            li.appendChild(songsTitle);

            if (playlist.songs.length === 0) {
              const noSongs = document.createElement("div");
              noSongs.className = "empty-text";
              noSongs.innerText = "No songs yet";
              li.appendChild(noSongs);
            } else {
              playlist.songs.forEach((song) => {
                const songItem = document.createElement("div");
                songItem.className = "song-row";

                const songName = document.createElement("span");
                songName.innerText = song;
                songItem.appendChild(songName);

                li.appendChild(songItem);
              });
            }

            if (currentUserId && playlist.user._id !== currentUserId) {
              const followBtn = document.createElement("button");
              followBtn.className = "follow-btn";

              if (followingUserIds.has(playlist.user._id)) {
                followBtn.innerText = "Following";
                followBtn.disabled = true;
                followBtn.classList.add("following");
              } else {
                followBtn.innerText = `Follow ${playlist.user.username}`;
                followBtn.onclick = () => {
                  followUser(playlist.user._id, playlist.user.username);
                };
              }

              li.appendChild(followBtn);
            }

            list.appendChild(li);
          });
        } catch (error) {
          showAppMessage("Could not load discover playlists", "error");
        }
      };

      loadSocialData();
      getMyPlaylists();
      loadDiscover();
    </script>
  </body>
</html>
