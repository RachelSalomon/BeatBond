<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeatBond - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <h1>Welcome to BeatBond</h1>
      <p class="subtitle">Your social music platform</p>
      <p id="status">Not logged in</p>

      <div id="loginSection">
        <h2>Login</h2>

        <input type="email" id="loginEmail" placeholder="Email" />
        <input type="password" id="loginPassword" placeholder="Password" />

        <button onclick="login()">Login</button>

        <p class="switch-text">
          Not registered yet?
          <span class="switch-link" onclick="showRegister()">Register</span>
        </p>
      </div>

      <div id="registerSection" class="hidden">
        <h2>Register</h2>

        <input type="text" id="username" placeholder="Username" />
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Password" />

        <button onclick="register()">Register</button>

        <p class="switch-text">
          Already have an account?
          <span class="switch-link" onclick="showLogin()">Login</span>
        </p>
      </div>

      <script>
        const updateStatus = () => {
          const token = localStorage.getItem("token");

          if (token) {
            document.getElementById("status").innerText =
              "You are already logged in";
          } else {
            document.getElementById("status").innerText = "Not logged in";
          }
        };

        const showRegister = () => {
          document.getElementById("loginSection").classList.add("hidden");
          document.getElementById("registerSection").classList.remove("hidden");
        };

        const showLogin = () => {
          document.getElementById("registerSection").classList.add("hidden");
          document.getElementById("loginSection").classList.remove("hidden");
        };

        updateStatus();

        const register = async () => {
          const username = document.getElementById("username").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          const res = await fetch("http://localhost:5000/api/auth/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username,
              email,
              password,
            }),
          });

          const data = await res.json();
          alert(data.message);

          if (res.ok) {
            showLogin();
          }
        };

        const login = async () => {
          const email = document.getElementById("loginEmail").value;
          const password = document.getElementById("loginPassword").value;

          const res = await fetch("http://localhost:5000/api/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email,
              password,
            }),
          });

          const data = await res.json();
          alert(data.message);

          if (data.token) {
            localStorage.setItem("token", data.token);
            window.location.href = "app.html";
          }
        };
      </script>
    </div>
  </body>
</html>
