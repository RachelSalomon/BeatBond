<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeatBond - Login</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .message-box {
        display: none;
        margin: 12px 0 18px 0;
        padding: 12px 14px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 500;
        text-align: center;
      }

      .message-box.success {
        display: block;
        background-color: #e8f8ec;
        color: #1f7a36;
        border: 1px solid #b7e4c7;
      }

      .message-box.error {
        display: block;
        background-color: #fdeaea;
        color: #b42318;
        border: 1px solid #f5c2c0;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Welcome to BeatBond</h1>
      <p class="subtitle">Your social music platform</p>
      <p id="status">Not logged in</p>

      <div id="messageBox" class="message-box"></div>

      <div id="loginSection">
        <h2>Login</h2>

        <input type="email" id="loginEmail" placeholder="Email" />
        <input type="password" id="loginPassword" placeholder="Password" />

        <button onclick="login()">Login</button>

        <p class="switch-text">
          Not registered yet?
          <span class="switch-link" onclick="showRegister()">Register</span>
        </p>
      </div>

      <div id="registerSection" class="hidden">
        <h2>Register</h2>

        <input type="text" id="username" placeholder="Username" />
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Password" />

        <button onclick="register()">Register</button>

        <p class="switch-text">
          Already have an account?
          <span class="switch-link" onclick="showLogin()">Login</span>
        </p>
      </div>

      <script>
        const API_BASE_URL = "https://beatbond-81f5.onrender.com";

        const messageBox = document.getElementById("messageBox");

        const showMessage = (message, type = "success") => {
          messageBox.textContent = message;
          messageBox.className = `message-box ${type}`;
        };

        const clearMessage = () => {
          messageBox.textContent = "";
          messageBox.className = "message-box";
        };

        const updateStatus = () => {
          const token = localStorage.getItem("token");

          if (token) {
            document.getElementById("status").innerText =
              "You are already logged in";
          } else {
            document.getElementById("status").innerText = "Not logged in";
          }
        };

        const showRegister = () => {
          clearMessage();
          document.getElementById("loginSection").classList.add("hidden");
          document.getElementById("registerSection").classList.remove("hidden");
        };

        const showLogin = () => {
          clearMessage();
          document.getElementById("registerSection").classList.add("hidden");
          document.getElementById("loginSection").classList.remove("hidden");
        };

        updateStatus();

        const register = async () => {
          clearMessage();

          const username = document.getElementById("username").value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();

          if (!username || !email || !password) {
            showMessage("Please fill in all registration fields", "error");
            return;
          }

          try {
            const res = await fetch(`${API_BASE_URL}/api/auth/register`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                username,
                email,
                password,
              }),
            });

            const data = await res.json();
            showMessage(data.message, res.ok ? "success" : "error");

            if (res.ok && data.token) {
              localStorage.setItem("token", data.token);
              updateStatus();

              document.getElementById("username").value = "";
              document.getElementById("email").value = "";
              document.getElementById("password").value = "";

              setTimeout(() => {
                window.location.href = "app.html";
              }, 1000);
            }
          } catch (error) {
            showMessage("Server error. Please try again later.", "error");
          }
        };

        const login = async () => {
          clearMessage();

          const email = document.getElementById("loginEmail").value.trim();
          const password = document
            .getElementById("loginPassword")
            .value.trim();

          if (!email || !password) {
            showMessage("Please fill in both email and password", "error");
            return;
          }

          try {
            const res = await fetch(`${API_BASE_URL}/api/auth/login`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                email,
                password,
              }),
            });

            const data = await res.json();
            showMessage(data.message, res.ok ? "success" : "error");

            if (data.token) {
              localStorage.setItem("token", data.token);
              updateStatus();

              setTimeout(() => {
                window.location.href = "app.html";
              }, 1000);
            }
          } catch (error) {
            showMessage("Server error. Please try again later.", "error");
          }
        };
      </script>
    </div>
  </body>
</html>
